const STORAGE_KEYS = {
  PROFILE: "cc_profile_v1",
  LOG:     "cc_log_v1",
  DATE:    "cc_date_v1",
};

function todayStr() {
  return new Date().toISOString().slice(0, 10); // "2025-03-11"
}

function loadState() {
  try {
    const profile = JSON.parse(localStorage.getItem(STORAGE_KEYS.PROFILE) || "null");
    const savedDate = localStorage.getItem(STORAGE_KEYS.DATE) || "";
    const today = todayStr();
    // Auto-clear log on new day, keep profile
    const log = savedDate === today
      ? JSON.parse(localStorage.getItem(STORAGE_KEYS.LOG) || "[]")
      : [];
    return { profile, log };
  } catch {
    return { profile: null, log: [] };
  }
}

function saveProfile(profile) {
  try { localStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(profile)); } catch {}
}

function saveLog(log) {
  try {
    localStorage.setItem(STORAGE_KEYS.LOG, JSON.stringify(log));
    localStorage.setItem(STORAGE_KEYS.DATE, todayStr());
  } catch {}
}

function clearAll() {
  Object.values(STORAGE_KEYS).forEach(k => localStorage.removeItem(k));
}

// NLP PARSER  (local rule-based, API hook ready)
// ─────────────────────────────────────────────────────────────────
/*
  Future API integration point:
  Replace parseNaturalLanguage() body with a fetch() to your backend,
  POST { text } → receive { name, caffeineMg, confidence, note }
  The UI, state, and confirmation flow are already built to handle that shape.
*/

const NLP_RULES = [
  // Starbucks
  { pattern: /starbucks.*(americano|黑咖).*(venti|大杯)/i, name: "Starbucks Americano (Venti)", mg: 300 },
  { pattern: /starbucks.*(americano|黑咖).*(grande|中杯)/i, name: "Starbucks Americano (Grande)", mg: 225 },

  { pattern: /double\s*(espresso|shot)/i, name: "Espresso (double shot)", mg: 126 },
  { pattern: /single\s*(espresso|shot)/i, name: "Espresso (single shot)", mg: 63  },
  { pattern: /espresso/i,         name: "Espresso (double)", mg: 126 },
  // Americano
  { pattern: /americano|美式/i,   name: "Americano (double shot)", mg: 126 },
  // Latte / flat white / cappuccino
  { pattern: /flat\s*white/i,     name: "Flat White",   mg: 130 },
  { pattern: /cappuccino|卡布/i,  name: "Cappuccino",   mg: 63  },
  { pattern: /latte|拿铁/i,       name: "Latte",        mg: 63  },
  // Cold brew
  { pattern: /cold\s*brew|冷萃/i, name: "Cold Brew (240ml)", mg: 62 },
  // Matcha
  { pattern: /matcha|抹茶/i,      name: "Matcha latte", mg: 70  },
  // Energy drinks
  { pattern: /monster/i,          name: "Monster Energy (500ml)", mg: 160 },
  { pattern: /red\s*bull|红牛/i,  name: "Red Bull (250ml)",       mg: 80  },
  // Tea
  { pattern: /green\s*tea|绿茶/i, name: "Green Tea",   mg: 28  },
  { pattern: /black\s*tea|红茶/i, name: "Black Tea",   mg: 47  },
  { pattern: /oolong|乌龙/i,      name: "Oolong Tea",  mg: 37  },
  { pattern: /chai/i,             name: "Chai Tea",    mg: 40  },
  // Coke / cola
  { pattern: /coke|cola|可乐/i,   name: "Coca-Cola (355ml)", mg: 34 },
  // Milk tea
  { pattern: /milk\s*tea|奶茶|珍珠奶茶|boba/i, name: "Milk Tea (large)", mg: 50 },
  // Generic coffee fallback
  { pattern: /coffee|咖啡/i,      name: "Coffee",      mg: 95  },
];

function parseNaturalLanguage(text) {
  if (!text.trim()) return null;

  // Check for explicit mg number first
  const mgMatch = text.match(/(\d+)\s*mg/i);
  if (mgMatch) {
    const mg = parseInt(mgMatch[1]);
    const namePart = text.replace(/\d+\s*mg/i, "").trim() || "Custom drink";
    return { name: namePart, caffeineMg: mg, confidence: "high", note: "mg value extracted directly" };
  }

  // Shot count capture
  const shotMatch = text.match(/(\d+)\s*shot/i);
  if (shotMatch) {
    const shots = Math.min(parseInt(shotMatch[1]), 8);
    return {
      name: `Espresso (${shots} shot${shots > 1 ? "s" : ""})`,
      caffeineMg: shots * 63,
      confidence: "high",
      note: `${shots} espresso shots × 63mg`,
    };
  }

  // Rule matching
  for (const rule of NLP_RULES) {
    if (rule.shotsCapture) continue;
    if (rule.pattern.test(text)) {
      return {
        name: rule.name,
        caffeineMg: rule.mg,
        confidence: "medium",
        note: "Matched from drink database",
      };
    }
  }

  return {
    name: text.trim(),
    caffeineMg: null, // Unknown — prompt user to confirm
    confidence: "low",
    note: "Couldn't identify caffeine content. Please confirm.",
  };
}

// ─────────────────────────────────────────────────────────────────
// CALCULATION LOGIC
// ─────────────────────────────────────────────────────────────────
function computeDailyLimit({ weightKg, age, sensitive }) {
  const weightBased = Math.round(weightKg * 4.5);
  let base = Math.min(400, weightBased);
  if (sensitive) base = Math.round(base * 0.65);
  if (age < 18) base = Math.min(base, 100);
  if (age < 12) base = Math.min(base, 45);
  return base;
}

function computeStatus(consumed, limit) {
  const r = consumed / limit;
  if (r > 1.0)  return "over";
  if (r >= 0.7) return "approaching";
  return "safe";
}

function isSingleDrinkLarge(mg, weightKg) {
  return mg >= 200 || mg >= weightKg * 3;
}

function estimateCoffeeCaffeine({ typeId, shots, mlAmount, gramsAmount }) {
  const t = COFFEE_TYPES.find(x => x.id === typeId);
  if (!t) return 0;
  if (t.hasShots)  return Math.round((shots || 1) * t.mgPerShot);
  if (t.hasGrams)  return Math.round((gramsAmount || 15) * t.mgPerG);
  if (t.hasMl)     return Math.round((mlAmount || 240) * t.mgPerMl);
  return 0;
}

function estimateTeaCaffeine({ typeId, mlAmount }) {
  const t = TEA_TYPES.find(x => x.id === typeId);
  if (!t) return 0;
  return Math.round(t.mgPer240ml * ((mlAmount || 240) / 240));
}

function totalCaffeine(log) {
  return log.reduce((s, e) => s + e.caffeineMg, 0);
}

function buildInitialState() {
  const { profile, log } = loadState();
  return {
    screen: profile ? "dashboard" : "setup",
    profile,
    log,
    simulatedDrink: null,
  };
}

function reducer(state, action) {
  let next;
  switch (action.type) {
    case "SETUP_COMPLETE":
      next = { ...state, screen: "dashboard", profile: action.profile, log: [] };
      saveProfile(action.profile);
      saveLog([]);
      return next;
    case "ADD_DRINK":
      next = { ...state, log: [...state.log, action.entry], simulatedDrink: null };
      saveLog(next.log);
      return next;
    case "REMOVE_DRINK":
      next = { ...state, log: state.log.filter(e => e.id !== action.id) };
      saveLog(next.log);
      return next;
    case "RESET_LOG":
      next = { ...state, log: [], simulatedDrink: null };
      saveLog([]);
      return next;
    case "SET_SIMULATION":
      return { ...state, simulatedDrink: action.drink };
    case "CLEAR_SIMULATION":
      return { ...state, simulatedDrink: null };
    case "RESET_ALL":
      clearAll();
      return { screen: "setup", profile: null, log: [], simulatedDrink: null };
    default:
      return state;
  }
}

// SETUP CARD
// ─────────────────────────────────────────────────────────────────
function SetupCard({ onComplete }) {
  const [age, setAge]         = useState(28);
  const [weight, setWeight]   = useState(68);
  const [sensitive, setSens]  = useState(false);
  const [bedtime, setBedtime] = useState("23:00");
  const [error, setError]     = useState("");

  const previewLimit = (age >= 5 && age <= 120 && weight >= 20 && weight <= 300)
    ? computeDailyLimit({ weightKg: weight, age, sensitive }) : null;

  function handleSubmit() {
    if (!age || age < 5 || age > 120)          { setError("Please enter a valid age."); return; }
    if (!weight || weight < 20 || weight > 300) { setError("Please enter a valid weight."); return; }
    const limit = computeDailyLimit({ weightKg: weight, age, sensitive });
    onComplete({ age: +age, weightKg: +weight, sensitive, bedtime, dailyLimit: limit });
  }

  return (
    <div style={T.card}>
      <div style={{ marginBottom: 28 }}>
        <span style={T.eyebrow}>Your coffee companion</span>
        <h1 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 34, color: "#2E1C0E", lineHeight: 1.1, marginBottom: 10 }}>
          A little context<br />goes a long way
        </h1>
        <p style={T.bodyMuted}>
          Two quick details and we'll give you a gentle daily reference — so you can enjoy coffee without second-guessing yourself.
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" }}>
        <div style={T.fieldGroup}>
          <label style={T.label}>Age</label>
          <input type="number" value={age} min={5} max={120}
            onChange={e => setAge(+e.target.value)} style={T.input} />
        </div>
        <div style={T.fieldGroup}>
          <label style={T.label}>Weight (kg)</label>
          <input type="number" value={weight} min={20} max={300}
            onChange={e => setWeight(+e.target.value)} style={T.input} />
        </div>
      </div>

      <div style={{ ...T.fieldGroup, flexDirection: "row", alignItems: "center" }}>
        <label style={{ ...T.label, marginBottom: 0, flex: 1 }}>I feel caffeine more than most</label>
        <button onClick={() => setSens(s => !s)} style={{
          padding: "7px 20px", borderRadius: 99, border: "none", cursor: "pointer",
          fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600,
          transition: "all 0.18s",
          background: sensitive ? "#5E3D24" : "#EDE7DF",
          color: sensitive ? "#FFF7F0" : "#8A7A6C",
        }}>
          {sensitive ? "Yes, a bit" : "Not really"}
        </button>
      </div>

      <div style={T.fieldGroup}>
        <label style={T.label}>Expected bedtime <span style={{ color: "#C4B8AD", fontWeight: 400 }}>(optional)</span></label>
        <input type="time" value={bedtime} onChange={e => setBedtime(e.target.value)} style={T.input} />
      </div>

      {previewLimit && (
        <div style={{
          background: "linear-gradient(135deg, #FDF5E8 0%, #F8EDDA 100%)",
          borderRadius: 16, padding: "18px 20px", marginBottom: 18,
          border: "1px solid #E8D9B8",
          display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#A08050", letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 4 }}>
              Your comfortable daily range
            </div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 38, color: "#5E3D24", lineHeight: 1 }}>
              ~{previewLimit} <span style={{ fontSize: 18, color: "#9A7050" }}>mg</span>
            </div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: "#A08050", marginTop: 6 }}>
              A soft guideline, not a ceiling.
            </div>
          </div>
          {age < 18 && (
            <div style={{ fontSize: 11, color: "#B5821A", maxWidth: 120, textAlign: "right", fontFamily: "'DM Sans',sans-serif", lineHeight: 1.4 }}>
              Note: Under 18 — lower limits apply
            </div>
          )}
        </div>
      )}

      {error && <p style={{ color: "#B84B3C", fontSize: 13, fontFamily: "'DM Sans',sans-serif", marginBottom: 12 }}>{error}</p>}

      <button onClick={handleSubmit} style={T.primaryBtn}>Start my day →</button>
      <p style={T.disclaimer}>A rough estimate to help you stay aware — not a strict limit, and not medical advice.</p>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// DASHBOARD CARD
// ─────────────────────────────────────────────────────────────────
function DashboardCard({ profile, consumed, limit, simulated, status, onReset }) {
  const cfg = S[status];
  const remaining = Math.max(0, limit - consumed);
  const projectedTotal = consumed + simulated;
  const projectedRemaining = Math.max(0, limit - projectedTotal);
  const projectedStatus = simulated > 0 ? computeStatus(projectedTotal, limit) : status;
  const projectedCfg = S[projectedStatus];
  const consumedPct = Math.min((consumed / limit) * 100, 100);
  const remainingPct = Math.max(0, 100 - consumedPct);
  const projectedPct = simulated > 0 ? Math.min((simulated / limit) * 100, remainingPct) : 0;

  // Bedtime caffeine advisory
  let bedtimeNote = null;
  if (profile.bedtime && consumed > 0) {
    const [bh, bm] = profile.bedtime.split(":").map(Number);
    const now = new Date();
    const bedMs = new Date(now).setHours(bh, bm, 0, 0);
    const hoursUntilBed = (bedMs - now) / 3_600_000;
    if (hoursUntilBed > 0 && hoursUntilBed < 8) {
      // caffeine half-life ~5h: after N hours, remaining = consumed * 0.5^(N/5)
      const remaining_in_system = Math.round(consumed * Math.pow(0.5, hoursUntilBed / 5));
      if (remaining_in_system > 100) {
        bedtimeNote = `~${remaining_in_system}mg still active at bedtime (${profile.bedtime})`;
      }
    }
  }

  return (
    <section style={{
      background: "linear-gradient(165deg, #FFFDF9 0%, #F7F1E8 72%, #F2E9DD 100%)",
      borderRadius: 30, padding: "22px 20px 20px",
      border: "1px solid #E7DDD1",
      boxShadow: "0 8px 30px rgba(82,58,33,0.11)",
    }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, marginBottom: 14 }}>
        <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#9D8D7E", lineHeight: 1.5 }}>
          {profile.age}y · {profile.weightKg}kg{profile.sensitive ? " · Sensitive" : ""}
          {profile.bedtime ? ` · Bedtime ${profile.bedtime}` : ""}
        </div>
        <button onClick={onReset} style={{
          border: "none", background: "transparent", cursor: "pointer",
          fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: "#C4B8AD", padding: 0,
        }}>Reset</button>
      </div>

      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 10.5, color: "#A79788", letterSpacing: 1.8, textTransform: "uppercase", marginBottom: 6 }}>
          Today's balance
        </div>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 56, lineHeight: 0.95, color: remaining > 0 ? "#2E1C0E" : "#8A3028", letterSpacing: "-1.6px" }}>
          {remaining} mg left
        </div>
        <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#8B7A6B", marginTop: 8 }}>
          {consumed} consumed · {limit} mg reference
        </div>
      </div>

      <div style={{ padding: "16px 14px 14px", borderRadius: 18, border: "1px solid #E5DACC", background: "#FFFCF7" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ ...T.barLabel, color: "#7F6F60" }}>Consumed</span>
          <span style={{ ...T.barLabel, color: "#7F6F60" }}>Room left</span>
        </div>
        <div style={{ height: 52, borderRadius: 14, background: "#EEE3D6", overflow: "hidden", position: "relative" }}>
          <div style={{
            position: "absolute", inset: 0,
            background: "repeating-linear-gradient(135deg, #F7EFE4 0, #F7EFE4 8px, #F2E8DB 8px, #F2E8DB 16px)",
          }} />
          <div style={{
            position: "absolute", left: 0, top: 0, bottom: 0,
            width: `${consumedPct}%`,
            background: "linear-gradient(90deg, #B9A18B 0%, #8B6A4E 100%)",
            transition: "width 0.5s cubic-bezier(0.4,0,0.2,1)",
          }} />
          {simulated > 0 && projectedPct > 0 && (
            <div style={{
              position: "absolute", left: `${consumedPct}%`, top: 0, bottom: 0,
              width: `${projectedPct}%`,
              background: "repeating-linear-gradient(135deg, #C8971F, #C8971F 6px, #E5BD5C 6px, #E5BD5C 12px)",
              opacity: 0.78,
            }} />
          )}
          <div style={{ position: "absolute", top: 0, bottom: 0, left: "70%", width: 1.5, background: "#FFFFFFCC" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
          <span style={T.barLabel}>{consumed} mg now</span>
          <span style={T.barLabel}>{Math.max(0, limit - consumed)} mg available</span>
        </div>
        {simulated > 0 && (
          <div style={{
            marginTop: 12, padding: "10px 12px", borderRadius: 12,
            border: `1px solid ${projectedCfg.track}`,
            background: projectedCfg.bg,
            fontFamily: "'DM Sans',sans-serif", fontSize: 12.5, color: projectedCfg.color, lineHeight: 1.45,
          }}>
            Next cup preview: +{simulated} mg · {projectedRemaining} mg left after this
          </div>
        )}
      </div>

      {bedtimeNote && (
        <div style={{
          marginTop: 10, padding: "9px 14px", borderRadius: 12,

// ─────────────────────────────────────────────────────────────────
// NLP INPUT PANEL
// ─────────────────────────────────────────────────────────────────
function NLPPanel({ profile, consumed, limit, onAdd }) {
  const [text, setText]           = useState("");
  const [result, setResult]       = useState(null);   // parsed result
  const [mgOverride, setMgOverride] = useState("");
  const [state, setState]         = useState("idle"); // idle | parsed | confirming | done
  const [shake, setShake]         = useState(false);
  const inputRef = useRef(null);

  const EXAMPLES = [
    "Starbucks grande americano",
    "Double espresso",
    "Luckin latte",
    "Matcha latte 70mg",
    "Cold brew 240ml",
  ];

  function handleParse() {
    if (!text.trim()) {
      setShake(true);
      setTimeout(() => setShake(false), 400);
      return;
    }
    const parsed = parseNaturalLanguage(text);
    setResult(parsed);
    setMgOverride(parsed.caffeineMg !== null ? String(parsed.caffeineMg) : "");
    setState("parsed");
  }

  function handleConfirm() {
    const mg = parseInt(mgOverride);
    if (!mg || mg < 1 || mg > 1500) return;
    const entry = {
      id: newId(),
      category: "nlp",
      name: result.name || text.trim(),
      caffeineMg: mg,
      timestamp: Date.now(),
      source: "natural language",
    };
    onAdd(entry);
    setText("");
    setResult(null);
    setState("done");
    setTimeout(() => setState("idle"), 1800);
  }

  function handleKeyDown(e) {
    if (e.key === "Enter") handleParse();
    if (e.key === "Escape") { setText(""); setResult(null); setState("idle"); }
  }

  const projStatus = result && mgOverride
    ? computeStatus(consumed + parseInt(mgOverride || 0), limit) : null;
  const projCfg = projStatus ? S[projStatus] : null;

  return (
    <div style={{ ...T.card, paddingTop: 20 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 4 }}>
        <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, color: "#2E1C0E" }}>
          Just tell me what you had
        </h2>
        <span style={{
          fontFamily: "'DM Sans',sans-serif", fontSize: 10, letterSpacing: 1.5,
          color: "#C4B8AD", textTransform: "uppercase", padding: "3px 8px",
          border: "1px solid #E3D9CF", borderRadius: 99,
        }}>AI · beta</span>
      </div>
      <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#AFA39A", marginBottom: 16, lineHeight: 1.5 }}>
        Type naturally — we'll figure out the caffeine.
      </p>

      {/* Input row */}
      <div style={{
        display: "flex", gap: 8,
        animation: shake ? "shake 0.35s ease" : "none",
      }}>
        <input
          ref={inputRef}
          type="text"
          value={text}
          onChange={e => { setText(e.target.value); if (state !== "idle") { setState("idle"); setResult(null); } }}
          onKeyDown={handleKeyDown}
          placeholder="e.g. double espresso, Starbucks grande latte…"
          style={{
            ...T.input, flex: 1,
            border: state === "parsed" && result?.confidence === "low"
              ? "1.5px solid #E8C878"
              : "1.5px solid #E3D9CF",
            transition: "border-color 0.2s",
          }}
        />
        <button
          onClick={handleParse}
          style={{
            padding: "0 20px", borderRadius: 12, border: "none", cursor: "pointer",
            background: "linear-gradient(135deg, #7A4F2E, #5E3D24)",
            color: "#FFF7F0", fontFamily: "'DM Sans',sans-serif",
            fontSize: 13, fontWeight: 700, whiteSpace: "nowrap",
            opacity: text.trim() ? 1 : 0.5,
            transition: "opacity 0.15s",
          }}
        >
          Parse →
        </button>
      </div>

      {/* Example chips */}
      {state === "idle" && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 12 }}>
          {EXAMPLES.map(ex => (
            <button key={ex} onClick={() => { setText(ex); inputRef.current?.focus(); }}
              style={{
                padding: "5px 12px", borderRadius: 99,
                border: "1px solid #E3D9CF", background: "#FAF6F2",
                fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: "#8A7A6C",
                cursor: "pointer", transition: "all 0.12s",
              }}>
              {ex}
            </button>
          ))}
        </div>
      )}

      {/* Parsed result */}
      {state === "parsed" && result && (
        <div style={{
          marginTop: 14, borderRadius: 16, overflow: "hidden",
          border: "1.5px solid #E3D9CF",
          animation: "fadeUp 0.25s ease both",
        }}>
          {/* Result header */}
          <div style={{
            padding: "12px 14px 10px",
            background: result.confidence === "high" ? "#F0F8F0"
              : result.confidence === "medium" ? "#FDF8F0" : "#FDF5F0",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <div style={{
                width: 8, height: 8, borderRadius: 99,
                background: result.confidence === "high" ? "#4E8A52"
                  : result.confidence === "medium" ? "#C08020" : "#B84038",
              }} />
              <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#AFA39A" }}>
                {result.confidence === "high" ? "High confidence"
                  : result.confidence === "medium" ? "Matched from database"
                  : "Couldn't identify — please confirm"}
              </span>
            </div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, color: "#2E1C0E" }}>
              {result.name || text}
            </div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: "#AFA39A", marginTop: 3 }}>
              {result.note}
            </div>
          </div>

          {/* mg editor */}
          <div style={{ padding: "12px 14px 14px", background: "#FDFAF7" }}>
            <label style={{ ...T.label, display: "block", marginBottom: 8 }}>
              Caffeine amount (mg) — edit if needed
            </label>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <input
                type="number"
                value={mgOverride}
                min={1} max={1500}
                onChange={e => setMgOverride(e.target.value)}
                placeholder="Enter mg"
                style={{
                  ...T.input, width: 110, textAlign: "center", fontSize: 22,
                  fontFamily: "'DM Serif Display',serif", color: "#3D2B1A",
                  border: result.caffeineMg === null ? "1.5px solid #E8C878" : "1.5px solid #E3D9CF",
                }}
              />
              {mgOverride && projCfg && (
                <div style={{
                  flex: 1, padding: "8px 12px", borderRadius: 10,
                  background: projCfg.bg, border: `1px solid ${projCfg.track}`,
                  fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: projCfg.color, lineHeight: 1.4,
                }}>
                  {Math.max(0, limit - consumed - parseInt(mgOverride || 0))} mg left after this
                </div>
              )}
            </div>

            <button
              onClick={handleConfirm}
              disabled={!mgOverride || parseInt(mgOverride) < 1}
              style={{
                ...T.primaryBtn,
                marginTop: 12,
                opacity: (!mgOverride || parseInt(mgOverride) < 1) ? 0.45 : 1,
                cursor: (!mgOverride || parseInt(mgOverride) < 1) ? "not-allowed" : "pointer",
              }}
            >
              Log this drink
            </button>
          </div>
        </div>
      )}

      {/* Success flash */}
      {state === "done" && (
        <div style={{
          marginTop: 14, padding: "14px 16px", borderRadius: 14,
          background: "#EEF5EF", border: "1px solid #C8DFC9",
          fontFamily: "'DM Sans',sans-serif", fontSize: 14, color: "#3E7A42",
          textAlign: "center", animation: "fadeUp 0.2s ease both",
        }}>
          ✓ Logged successfully
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// ADD DRINK PANEL (manual)
// ─────────────────────────────────────────────────────────────────
function AddDrinkPanel({ profile, consumed, limit, onAdd, onSimulate }) {
  const [category, setCategory]       = useState("branded");
  const [brandedId, setBrandedId]     = useState(BRANDED_DRINKS[0].id);
  const [coffeeTypeId, setCoffeeType] = useState("espresso");
  const [shots, setShots]             = useState(2);
  const [mlAmount, setMlAmount]       = useState(240);
  const [gramsAmount, setGrams]       = useState(15);
  const [teaTypeId, setTeaType]       = useState("black-tea");
  const [teaMl, setTeaMl]             = useState(240);
  const [softMg, setSoftMg]           = useState(34);
  const [softName, setSoftName]       = useState("Soda");

  const coffeeType = COFFEE_TYPES.find(t => t.id === coffeeTypeId);

  const CATS = [
    { id: "branded", label: "Branded" },
    { id: "coffee",  label: "Coffee"  },
    { id: "tea",     label: "Tea"     },
    { id: "other",   label: "Other"   },
  ];

  function buildEntry(id) {
    const ts = Date.now();
    if (category === "branded") {
      const d = BRANDED_DRINKS.find(b => b.id === brandedId);
      return { id, category: "branded", name: `${d.name} (${d.size})`, caffeineMg: d.caffeineMg, timestamp: ts };
    }
    if (category === "coffee") {
      const ct = COFFEE_TYPES.find(t => t.id === coffeeTypeId);
      const mg = estimateCoffeeCaffeine({ typeId: coffeeTypeId, shots, mlAmount, gramsAmount });
      const sl = ct.hasShots ? ` · ${shots} shot${shots !== 1 ? "s" : ""}` : "";
      return { id, category: "coffee", name: `${ct.name}${sl}`, caffeineMg: mg, timestamp: ts };
    }
    if (category === "tea") {
      const tt = TEA_TYPES.find(t => t.id === teaTypeId);
      const mg = estimateTeaCaffeine({ typeId: teaTypeId, mlAmount: teaMl });
      return { id, category: "tea", name: `${tt.name} (${teaMl}ml)`, caffeineMg: mg, timestamp: ts };
    }
    return { id, category: "other", name: softName.trim() || "Drink", caffeineMg: softMg, timestamp: ts };
  }

  const previewEntry = buildEntry("preview");
  const previewMg = previewEntry.caffeineMg;
  const isLarge = isSingleDrinkLarge(previewMg, profile.weightKg);
  const projectedRemaining = Math.max(0, limit - consumed - previewMg);
  const projectedStatus = computeStatus(consumed + previewMg, limit);
  const projectedCfg = S[projectedStatus];

  // Stable simulate callback
  const stableSimulate = useCallback(onSimulate, []);
  useEffect(() => {
    stableSimulate({ ...previewEntry, id: `sim-${category}` });
  }, [category, brandedId, coffeeTypeId, shots, mlAmount, gramsAmount, teaTypeId, teaMl, softMg, softName]);

  return (
    <div style={{ ...T.card, paddingTop: 20 }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 16 }}>
        <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, color: "#2E1C0E" }}>
          Next cup preview
        </h2>
        <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11.5, color: "#AFA39A" }}>
          What are you thinking of having?
        </span>
      </div>

      {/* Category tabs */}
      <div style={{ display: "flex", background: "#F3EDE5", borderRadius: 12, padding: 4, marginBottom: 18, gap: 2 }}>
        {CATS.map(c => (
          <button key={c.id} onClick={() => setCategory(c.id)} style={{
            flex: 1, padding: "7px 0", borderRadius: 9, border: "none", cursor: "pointer",
            fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600,
            transition: "all 0.15s",
            background: category === c.id ? "#FFFFFF" : "transparent",
            color: category === c.id ? "#3D2B1A" : "#9A8E84",
            boxShadow: category === c.id ? "0 1px 6px rgba(90,60,30,0.12)" : "none",
          }}>{c.label}</button>
        ))}
      </div>

      <div style={{ minHeight: 88 }}>
        {category === "branded" && (
          <select value={brandedId} onChange={e => setBrandedId(e.target.value)} style={T.input}>
            {BRANDED_DRINKS.map(d => <option key={d.id} value={d.id}>{d.name} — {d.size}</option>)}
          </select>
        )}
        {category === "coffee" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <select value={coffeeTypeId} onChange={e => setCoffeeType(e.target.value)} style={T.input}>
              {COFFEE_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            {coffeeType?.hasShots && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#6B5748" }}>Shots</span>
                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                  <button onClick={() => setShots(s => Math.max(1, s - 1))} style={T.stepBtn}>−</button>
                  <span style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, color: "#3D2B1A", minWidth: 20, textAlign: "center" }}>{shots}</span>
                  <button onClick={() => setShots(s => Math.min(6, s + 1))} style={T.stepBtn}>+</button>
                </div>
              </div>
            )}
            {coffeeType?.hasGrams && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <label style={T.label}>Grounds (g)</label>
                <input type="number" value={gramsAmount} min={5} max={60}
                  onChange={e => setGrams(+e.target.value)}
                  style={{ ...T.input, width: 100, textAlign: "center" }} />
              </div>
            )}
            {coffeeType?.hasMl && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <label style={T.label}>Amount (ml)</label>
                <input type="number" value={mlAmount} min={60} max={1000}
                  onChange={e => setMlAmount(+e.target.value)}
                  style={{ ...T.input, width: 100, textAlign: "center" }} />
              </div>
            )}
          </div>
        )}
        {category === "tea" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <select value={teaTypeId} onChange={e => setTeaType(e.target.value)} style={T.input}>
              {TEA_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <label style={T.label}>Cup size (ml)</label>
              <input type="number" value={teaMl} min={100} max={600}
                onChange={e => setTeaMl(+e.target.value)}
                style={{ ...T.input, width: 100, textAlign: "center" }} />
            </div>
          </div>
        )}
        {category === "other" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <input type="text" value={softName} placeholder="Drink name"
              onChange={e => setSoftName(e.target.value)} style={T.input} />
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <label style={T.label}>Caffeine (mg)</label>
              <input type="number" value={softMg} min={0} max={500}
                onChange={e => setSoftMg(parseFloat(e.target.value) || 0)}
                style={{ ...T.input, width: 100, textAlign: "center" }} />
            </div>
          </div>
        )}
      </div>

      {/* Preview pill */}
      <div style={{
        marginTop: 16, padding: "12px 16px", borderRadius: 14,
        background: projectedCfg.bg, border: `1px solid ${projectedCfg.track}`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 10.5, color: "#A08870", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 2 }}>
            Preview for this choice
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 5 }}>
            <span style={{ fontFamily: "'DM Serif Display',serif", fontSize: 26, color: "#5E3D24" }}>+{previewMg}</span>
            <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#9A7A5A" }}>mg</span>
          </div>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: projectedCfg.color, marginTop: 3 }}>
            {projectedRemaining} mg left after this
          </div>
        </div>
        {isLarge && (
          <div style={{
            padding: "5px 12px", borderRadius: 99,
            background: "#FDF0D8", border: "1px solid #E8C878",
            fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#9A6A10", fontWeight: 600,
          }}>Strong pour</div>
        )}
      </div>

      <button
        onClick={() => { const e = buildEntry(newId()); if (e) onAdd(e); }}
        style={{ ...T.primaryBtn, marginTop: 14 }}
      >
        Log this cup
      </button>
    </div>
  );
}

              Caffeine Check
            </div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: screen === "setup" ? 28 : 24, color: "#2E1C0E", lineHeight: 1.1, whiteSpace: "pre-line" }}>
              {screen === "setup" ? "How much is\ntoo much today?" : "How's your\nday going?"}
            </div>
          </div>
          {screen === "dashboard" && (
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#AFA39A", textAlign: "right", lineHeight: 1.4 }}>
              {new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" })}
            </div>
          )}
        </div>

        {/* Setup */}
        {screen === "setup" && (
          <div className="fu">
            <SetupCard onComplete={p => dispatch({ type: "SETUP_COMPLETE", profile: p })} />
          </div>
        )}

        {/* Dashboard */}
        {screen === "dashboard" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

            <div className="fu fu1">
              <DashboardCard
                profile={profile}
                consumed={consumed}
                limit={limit}
                simulated={simMg}
                status={status}
                onReset={() => dispatch({ type: "RESET_ALL" })}
              />
            </div>

            {/* Input mode switcher */}
            <div className="fu fu2" style={{
              display: "flex", background: "#EDE7DF", borderRadius: 14, padding: 4, gap: 3,
            }}>
              {[
                { id: "nlp",    label: "✦ Tell me what I had" },
                { id: "manual", label: "Choose from list" },
              ].map(m => (
                <button key={m.id} onClick={() => setInputMode(m.id)} style={{
                  flex: 1, padding: "9px 0", borderRadius: 11, border: "none", cursor: "pointer",
                  fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600,
                  transition: "all 0.15s",
                  background: inputMode === m.id ? "#FFFFFF" : "transparent",
                  color: inputMode === m.id ? "#3D2B1A" : "#9A8E84",
                  boxShadow: inputMode === m.id ? "0 1px 8px rgba(90,60,30,0.14)" : "none",
                }}>{m.label}</button>
              ))}
            </div>

            <div className="fu fu3">
              {inputMode === "nlp" ? (
                <NLPPanel
                  profile={profile}
                  consumed={consumed}
                  limit={limit}
                  onAdd={e => dispatch({ type: "ADD_DRINK", entry: e })}
                />
              ) : (
                <AddDrinkPanel
                  profile={profile}
                  consumed={consumed}
                  limit={limit}
                  onAdd={e => dispatch({ type: "ADD_DRINK", entry: e })}
                  onSimulate={handleSimulate}
                />
              )}
            </div>

            <div className="fu fu4">
              <DrinkLogList
                log={log}
                onRemove={id => dispatch({ type: "REMOVE_DRINK", id })}
              />
            </div>

            {log.length > 0 && (
              <div className="fu fu5" style={{ textAlign: "center" }}>
                <button
                  onClick={() => dispatch({ type: "RESET_LOG" })}
                  style={{
                    border: "none", background: "transparent", cursor: "pointer",
                    fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#C4B8AD",
                    padding: "8px 16px", borderRadius: 10,
                  }}>
                  Start fresh today
                </button>
              </div>
            )}
          </div>
        )}

        <Disclaimer />
      </div>
    </>
  );
}
